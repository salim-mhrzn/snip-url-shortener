{% extends 'base.html' %}
{% block title %}Edit URL — Snip{% endblock %}
{% block content %}
<div style="max-width:600px; margin:0 auto;">
    <div class="page-header">
        <div class="page-title">Edit URL</div>
        <a href="{% url 'url_detail' url.pk %}" class="btn btn-secondary">← Back</a>
    </div>
    <div class="card">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<ul class="errorlist">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
            </div>
            {% endfor %}
            <div style="display:flex; gap:1rem; margin-top:1rem;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'url_detail' url.pk %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
